<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enseñanza del cálculo en bachillerato</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1 class="title">Color Palette Generator</h1>
    </header>

    <main>
      <div class="controls-section">
        <div class="form-group">
          <label for="palette-size">Palette Size</label>
          <select id="palette-size">
            <option value="6">6 colors</option>
            <option value="8">8 colors</option>
            <option value="9">9 colors</option>
          </select>
        </div>
        <div class="form-group">
          <label>Color Encoding</label>
          <div class="radio-group-container">
            <div class="radio-item">
              <input 
              type="radio"
              id="hex"
              name="encoding"
              value="hex" 
              checked
              />
              <label for="hex">HEX</label>
            </div>
            <div class="radio-item">
              <input
                type="radio"
                id="hsl"
                name="encoding"
                value="hsl"
              />
              <label for="hsl">HSL</label>
            </div> 
          </div>
        </div>
        <button id="generate-button">Generate Palette</button>
      </div>
      <div id="palette-container">
       <!--Here goes the cards generated (6, 8 or 9), which compose the palette-->
      </div>
       <div id="micro-feedback" role="status" aria-live="polite"></div>
    </main>
    
    <script src="js/app.js"></script>
  </body>
</html>
